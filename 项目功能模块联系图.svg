  <ellipse class="oval" cx="750" cy="160" rx="130" ry="42"/>
  <text class="small" x="750" y="169" text-anchor="middle">金豆服务</text>

  <ellipse class="oval" cx="1070" cy="160" rx="130" ry="42"/>
  <text class="small" x="1070" y="169" text-anchor="middle">评价服务</text>

  <ellipse class="oval" cx="430" cy="545" rx="130" ry="42"/>
  <text class="small" x="430" y="554" text-anchor="middle">云函数 api</text>

  <ellipse class="oval" cx="1070" cy="545" rx="130" ry="42"/>
  <text class="small" x="1070" y="554" text-anchor="middle">云数据库</text>

  <ellipse class="oval" cx="750" cy="545" rx="130" ry="42"/>
  <text class="small" x="750" y="554" text-anchor="middle">定时任务</text>

  <!-- center links -->
  <path class="line" d="M270 395 C380 395 455 365 565 365"/>
  <text class="small" x="385" y="365" text-anchor="middle">提交订单</text>

  <path class="line" d="M1230 405 C1110 405 1030 372 935 372"/>
  <text class="small" x="1105" y="370" text-anchor="middle">接单处理</text>

  <path class="line" d="M750 202 V260"/>
  <text class="small" x="795" y="238">金豆变动</text>

  <path class="line" d="M430 202 C470 230 520 260 565 300"/>
  <text class="small" x="475" y="245">公告轮播</text>

  <path class="line" d="M1070 202 C1030 235 985 280 935 320"/>
  <text class="small" x="1035" y="250">评价反馈</text>

  <path class="line" d="M565 430 C515 465 475 500 430 545"/>
  <text class="small" x="470" y="500">接口调用</text>

  <path class="line" d="M935 430 C985 465 1025 500 1070 545"/>
  <text class="small" x="1030" y="500">数据读写</text>

  <path class="line" d="M750 503 V475"/>

  <!-- admin backend -->
  <rect class="rect" x="565" y="675" width="370" height="75"/>
  <text class="main" x="750" y="725" text-anchor="middle">管理员后台</text>

  <ellipse class="oval" cx="260" cy="850" rx="115" ry="38"/>
  <text class="small" x="260" y="859" text-anchor="middle">用户管理</text>

  <ellipse class="oval" cx="455" cy="850" rx="115" ry="38"/>
  <text class="small" x="455" y="859" text-anchor="middle">订单管理</text>

  <ellipse class="oval" cx="650" cy="850" rx="115" ry="38"/>
  <text class="small" x="650" y="859" text-anchor="middle">认证审核</text>

  <ellipse class="oval" cx="845" cy="850" rx="115" ry="38"/>
  <text class="small" x="845" y="859" text-anchor="middle">公告轮播</text>

  <ellipse class="oval" cx="1040" cy="850" rx="115" ry="38"/>
  <text class="small" x="1040" y="859" text-anchor="middle">评价管理</text>

  <ellipse class="oval" cx="1235" cy="850" rx="115" ry="38"/>
  <text class="small" x="1235" y="859" text-anchor="middle">金豆明细</text>

  <path class="line" d="M750 475 V675"/>
  <text class="small" x="775" y="640">数据管理与审核</text>

  <path class="plain" d="M260 812 V785 H1235 V812"/>
  <path class="plain" d="M455 812 V785"/>
  <path class="plain" d="M650 812 V785"/>
  <path class="plain" d="M845 812 V785"/>
  <path class="plain" d="M1040 812 V785"/>
  <path class="plain" d="M750 750 V785"/>

</svg>
