  <ellipse class="oval" cx="150" cy="215" rx="120" ry="38"/>
  <text class="small" x="150" y="224" text-anchor="middle">用户注册 / 登录</text>

  <ellipse class="oval" cx="150" cy="305" rx="120" ry="38"/>
  <text class="small" x="150" y="314" text-anchor="middle">地址管理</text>

  <ellipse class="oval" cx="150" cy="395" rx="120" ry="38"/>
  <text class="small" x="150" y="404" text-anchor="middle">分类下单</text>

  <ellipse class="oval" cx="150" cy="485" rx="120" ry="38"/>
  <text class="small" x="150" y="494" text-anchor="middle">订单查看 / 取消</text>

  <ellipse class="oval" cx="150" cy="575" rx="120" ry="38"/>
  <text class="small" x="150" y="584" text-anchor="middle">确认收货 / 评价</text>

  <path class="plain" d="M60 153 V575"/>
  <path class="plain" d="M60 215 H30"/>
  <path class="plain" d="M60 305 H30"/>
  <path class="plain" d="M60 395 H30"/>
  <path class="plain" d="M60 485 H30"/>
  <path class="plain" d="M60 575 H30"/>

  <!-- rider side -->
  <ellipse class="oval" cx="1350" cy="120" rx="105" ry="43"/>
  <text class="text" x="1350" y="130" text-anchor="middle">骑手端</text>

  <ellipse class="oval" cx="1350" cy="225" rx="120" ry="38"/>
  <text class="small" x="1350" y="234" text-anchor="middle">骑手注册 / 登录</text>

  <ellipse class="oval" cx="1350" cy="315" rx="120" ry="38"/>
  <text class="small" x="1350" y="324" text-anchor="middle">提交认证</text>

  <ellipse class="oval" cx="1350" cy="405" rx="120" ry="38"/>
  <text class="small" x="1350" y="414" text-anchor="middle">接单大厅</text>

  <ellipse class="oval" cx="1350" cy="495" rx="120" ry="38"/>
  <text class="small" x="1350" y="504" text-anchor="middle">订单配送</text>

  <ellipse class="oval" cx="1350" cy="585" rx="120" ry="38"/>
  <text class="small" x="1350" y="594" text-anchor="middle">确认送达</text>

  <path class="plain" d="M1440 153 V585"/>
  <path class="plain" d="M1440 225 H1470"/>
  <path class="plain" d="M1440 315 H1470"/>
  <path class="plain" d="M1440 405 H1470"/>
  <path class="plain" d="M1440 495 H1470"/>
  <path class="plain" d="M1440 585 H1470"/>

  <!-- center system -->
  <rect class="rect" x="565" y="260" width="370" height="215"/>
  <text class="main" x="750" y="345" text-anchor="middle">核心业务系统</text>
  <text class="small" x="750" y="390" text-anchor="middle">订单流转、认证审核、数据处理</text>

  <ellipse class="oval" cx="430" cy="160" rx="130" ry="42"/>
