<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111"/>
    </marker>
    <style>
      .bg { fill: #fff; }
      .rect { fill: #fff; stroke: #111; stroke-width: 2.4; }
      .oval { fill: #fff; stroke: #111; stroke-width: 2.4; }
      .line { fill: none; stroke: #111; stroke-width: 2.2; marker-end: url(#arrow); }
      .plain { fill: none; stroke: #111; stroke-width: 2.2; }
      .title { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 42px; font-weight: 700; fill: #111; }
      .main { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #111; }
      .text { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 27px; fill: #111; }
      .small { font-family: "Microsoft YaHei", "Noto Sans CJK SC", Arial, sans-serif; font-size: 23px; fill: #111; }
    </style>
  </defs>

  <rect class="bg" width="1500" height="1000"/>
  <text class="title" x="750" y="58" text-anchor="middle">校园跑腿小程序模块联系图</text>

  <!-- user side -->
  <ellipse class="oval" cx="150" cy="120" rx="105" ry="43"/>
